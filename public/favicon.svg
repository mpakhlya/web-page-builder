<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mirror background circle -->
  <circle cx="32" cy="32" r="30" fill="#0A0A0A"/>
  <!-- Subtle gold outer ring (frame) -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#C9A84C" stroke-width="1.5"/>
  <!-- Inner reflective surface with gradient -->
  <defs>
    <radialGradient id="mirror" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3A3A3A"/>
      <stop offset="60%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="24" fill="url(#mirror)"/>
  <!-- Gold reflection highlight (top-left) -->
  <ellipse cx="22" cy="20" rx="6" ry="3" fill="#C9A84C" opacity="0.55" transform="rotate(-30 22 20)"/>
  <!-- Soft inner highlight -->
  <ellipse cx="20" cy="18" rx="2" ry="1" fill="#F5F5F3" opacity="0.4"/>
</svg>
